name: SDK Parity Dispatch

on:
  push:
    paths:
      - "src/main/java/**"
      - "pom.xml"
  pull_request:
    paths:
      - "src/main/java/**"
      - "pom.xml"
  workflow_dispatch:

jobs:
  parity-dispatch:
    uses: tapsilat/tapsilat-sdk-parity/.github/workflows/reusable-sdk-parity-dispatch.yml@main
    secrets: inherit
